coverage:
  status:
    project:
      default: false
      rust:
        flags: [rust]
      python:
        flags: [python]
    patch:
      default: false
      rust:
        flags: [rust]
        target: auto # new code must not be less covered than the base commit
        threshold: 1%
      python:
        flags: [python]
        target: auto
        threshold: 1%

flags:
  rust:
    paths:
      - src/
  python:
    paths:
      - python/

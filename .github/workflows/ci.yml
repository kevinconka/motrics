name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --all-features

  python:
    name: Python (ruff · ty · pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: Build extension into the venv
        run: uv run maturin develop --uv
      - name: ty check
        run: uv run ty check
      - name: pytest
        run: uv run pytest

  parity:
    name: TrackEval parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dev + parity dependencies
        run: uv sync --group dev --group parity
      - name: Build extension into the venv
        run: uv run maturin develop --uv
      - name: pytest (parity vs TrackEval)
        run: uv run pytest tests/test_parity.py -v

  benchmark:
    name: Benchmark (parity + speed, fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dev + parity dependencies
        run: uv sync --group dev --group parity
      # Release build — a debug build is ~10x slower and the timings would be
      # meaningless (the benchmark warns loudly if it detects a debug build).
      - name: Build extension (release) into the venv
        run: uv run maturin develop --release --uv
      # Runs on the committed synthetic fixtures (no network). Fails on any
      # numeric parity mismatch across motrics / TrackEval / py-motmetrics.
      - name: Benchmark on fixtures (parity gate + timing)
        run: uv run python benchmarks/benchmark.py --repeats 3

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"] # abi3-py310: min + max cover it
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --group dev --group parity # parity deps activate the parity tests
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run maturin develop --uv
      - run: uv run ty check
      - run: uv run pytest

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --group dev --group parity # parity deps activate the parity tests
      - name: Build instrumented extension and run tests
        run: |
          cargo llvm-cov clean --workspace
          source <(cargo llvm-cov show-env --export-prefix)
          uv run maturin develop --uv
          uv run pytest --cov=motrics --cov-report=xml
          cargo llvm-cov report --codecov --output-path codecov.json
      - uses: codecov/codecov-action@v5
        with:
          files: ./codecov.json
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmark:
    name: Benchmark (real data)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20 # bounds a stalled ~150 MB data fetch
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --group dev --group parity
      - name: Cache real MOT17 data (~150 MB, seldom changes)
        uses: actions/cache@v4
        with:
          path: benchmarks/data/real
          key: mot17-train-v1
      - run: uv run python benchmarks/download.py
      - run: uv run maturin develop --release --uv
      - run: uv run python benchmarks/benchmark.py --markdown benchmark-results.md
      - name: Post results as a PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: benchmark-results
          path: benchmark-results.md

name: Benchmark

# Downloads real MOTChallenge sequences and benchmarks motrics vs TrackEval /
# py-motmetrics. Off the PR path (needs a ~150 MB download); manual or weekly.
on:
  workflow_dispatch:
    inputs:
      split:
        description: MOTChallenge split to benchmark
        default: MOT17-train
        type: string
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --group dev --group parity
      - run: uv run maturin develop --release --uv
      # split via env var, not inline interpolation (avoids shell injection)
      - run: uv run python benchmarks/download.py --split "$SPLIT"
        env:
          SPLIT: ${{ inputs.split || 'MOT17-train' }}
      - run: uv run python benchmarks/benchmark.py --repeats 3

name: Release-plz

# Keeps a standing "release PR" up to date (version bump + changelog, from
# Conventional Commits) on every push to main, and on demand via the Actions
# tab (workflow_dispatch). Merging that PR is the only manual step needed to
# actually ship — it triggers the release job below, which tags + creates a
# GitHub Release. The tag is meant to trigger release.yml (wheel build + PyPI
# publish) on its own — but that only happens if the tag push is attributed to
# a real identity: GitHub doesn't let the default GITHUB_TOKEN trigger other
# workflows (anti-recursion safeguard). Add a fine-grained PAT (contents:
# write on this repo) as the RELEASE_PLZ_TOKEN secret to get that; until then
# this falls back to GITHUB_TOKEN, which still tags + creates the GitHub
# Release, it just won't cascade into release.yml (run it manually via its
# own workflow_dispatch in the meantime). No `cargo publish`: motrics isn't a
# published crate (see release-plz.toml).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

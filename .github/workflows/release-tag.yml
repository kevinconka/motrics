name: Tag release

# Tags Cargo.toml's current version if it isn't tagged yet, creates a GitHub
# Release with auto-generated notes (grouped by merged PRs), and dispatches
# release.yml at that tag to build wheels and publish to PyPI. Dispatches
# explicitly rather than relying on the tag push to trigger it: pushes made
# with GITHUB_TOKEN can't trigger other workflows, but workflow_dispatch is
# an explicit exception to that rule, so no PAT is needed here.
#
# To cut a release: bump `version` in Cargo.toml in a normal PR and merge it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tag-release:
    name: Tag and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Tag and release if Cargo.toml's version isn't tagged yet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          tag="v$version"
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "refs/tags/$tag$"; then
            echo "Tag $tag already exists, nothing to do."
            exit 0
          fi
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --repo "${{ github.repository }}" --generate-notes
          gh workflow run release.yml --repo "${{ github.repository }}" --ref "$tag"

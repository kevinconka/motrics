name: Benchmark (real data)

# Opt-in: downloads real MOTChallenge sequences and benchmarks on them. Off the
# PR/push path — runs on manual dispatch or weekly.
on:
  workflow_dispatch:
    inputs:
      split:
        description: MOTChallenge split to benchmark
        default: MOT17-train
        type: string
  schedule:
    - cron: "23 5 * * 1"
  # TEMPORARY: verify the download host is reachable from CI. Remove once green.
  push:
    branches: [claude/checklist-completion-si092y]

permissions:
  contents: read

jobs:
  benchmark-real:
    name: Real data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --group dev --group parity
      - run: uv run maturin develop --release --uv
      - run: uv run python benchmarks/download.py --split "${{ inputs.split || 'MOT17-train' }}"
      - run: uv run python benchmarks/benchmark.py --repeats 3
